<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dnd-map-index</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 1rem; }
h1 { text-align: center; color: #c4a35a; margin-bottom: .3rem; font-size: 1.5rem; }
.subtitle { text-align: center; color: #888; font-size: .85rem; margin-bottom: 1rem; }
.subtitle a { color: #7a9ec2; }
.filters { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; margin-bottom: 1rem; }
.filters select, .filters input { background: #16213e; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; padding: .4rem .6rem; font-size: .9rem; }
.filters input { width: 200px; }
.stats { text-align: center; color: #888; font-size: .85rem; margin-bottom: 1rem; }
.results { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: .8rem; }
.card { background: #16213e; border: 1px solid #333; border-radius: 6px; padding: .8rem; transition: border-color .2s; }
.card:hover { border-color: #c4a35a; }
.card h3 { font-size: .95rem; color: #c4a35a; margin-bottom: .4rem; }
.card h3 a { color: inherit; text-decoration: none; }
.card h3 a:hover { text-decoration: underline; }
.meta { font-size: .8rem; color: #999; line-height: 1.6; }
.tag { display: inline-block; background: #0f3460; color: #7a9ec2; padding: .1rem .4rem; border-radius: 3px; font-size: .75rem; margin: .1rem; }
.tag.env { background: #1a4a1a; color: #7ac27a; }
.license { font-size: .75rem; }
.license.free { color: #5cb85c; }
.license.unknown { color: #d9534f; }
.empty { text-align: center; color: #666; padding: 2rem; }
</style>
</head>
<body>

<h1>⚔️ dnd-map-index</h1>
<p class="subtitle">Free D&D 5e battle maps — <a href="https://github.com/dracoroboter/dnd-map-index">GitHub</a></p>

<div class="filters">
  <input type="text" id="text" placeholder="Search title..." oninput="search()">
  <select id="env" onchange="search()"><option value="">All environments</option></select>
  <select id="license" onchange="search()">
    <option value="">All licenses</option>
    <option value="free">🟢 Free</option>
    <option value="unknown">🔴 Unknown</option>
  </select>
  <select id="status" onchange="search()">
    <option value="">All status</option>
    <option value="ok">Tagged only</option>
  </select>
</div>

<div class="stats" id="stats"></div>
<div class="results" id="results"></div>

<script>
let ALL = [];

async function load() {
  const r = await fetch('index/dyson-logos.json');
  ALL = (await r.json()).filter(m => m.status !== 'removed');
  // populate env dropdown
  const envs = [...new Set(ALL.map(m => m.environment).filter(Boolean))].sort();
  const sel = document.getElementById('env');
  envs.forEach(e => { const o = document.createElement('option'); o.value = e; o.textContent = e; sel.appendChild(o); });
  search();
}

function search() {
  const text = document.getElementById('text').value.toLowerCase();
  const env = document.getElementById('env').value;
  const lic = document.getElementById('license').value;
  const status = document.getElementById('status').value;

  let maps = ALL;
  if (text) maps = maps.filter(m => m.title.toLowerCase().includes(text) || (m.tags||[]).some(t => t.includes(text)));
  if (env) maps = maps.filter(m => m.environment === env);
  if (lic === 'free') maps = maps.filter(m => m.license?.type !== 'unknown');
  if (lic === 'unknown') maps = maps.filter(m => m.license?.type === 'unknown');
  if (status === 'ok') maps = maps.filter(m => m.status === 'ok');

  document.getElementById('stats').textContent = `${maps.length} maps found (${ALL.length} total in index)`;

  const el = document.getElementById('results');
  if (!maps.length) { el.innerHTML = '<div class="empty">No maps found.</div>'; return; }

  el.innerHTML = maps.slice(0, 60).map(m => {
    const tags = (m.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    const envTag = m.environment ? `<span class="tag env">${m.environment}</span>` : '';
    const licType = m.license?.type || 'unknown';
    const licClass = licType === 'unknown' ? 'unknown' : 'free';
    const licLabel = licType === 'unknown' ? '🔴 unknown' : '🟢 ' + licType;
    return `<div class="card">
      <h3><a href="${m.source_url}" target="_blank" rel="noopener">${m.title}</a></h3>
      <div class="meta">
        ${envTag} ${tags}
        <br><span class="license ${licClass}">${licLabel}</span> — ${m.author}
      </div>
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
